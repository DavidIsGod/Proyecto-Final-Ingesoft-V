apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: circleguard-ingress
  namespace: circleguard
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.circleguard.example.com
      secretName: circleguard-tls-secret
  rules:
    - host: api.circleguard.example.com
      http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: circleguard-auth-service
                port:
                  number: 8180
          - path: /gateway
            pathType: Prefix
            backend:
              service:
                name: circleguard-gateway-service
                port:
                  number: 8087
          - path: /dashboard
            pathType: Prefix
            backend:
              service:
                name: circleguard-dashboard-service
                port:
                  number: 8084
