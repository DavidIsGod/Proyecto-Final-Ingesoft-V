apiVersion: apps/v1
kind: Deployment
metadata:
  name: circleguard-form-service
  namespace: circleguard
  labels:
    app: circleguard-form-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: circleguard-form-service
  template:
    metadata:
      labels:
        app: circleguard-form-service
    spec:
      serviceAccountName: circleguard-form-service
      containers:
        - name: circleguard-form-service
          image: circleguard/form-service:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8086
          envFrom:
            - configMapRef:
                name: circleguard-common
            - secretRef:
                name: circleguard-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8086
            initialDelaySeconds: 90
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8086
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: circleguard-form-service
  namespace: circleguard
spec:
  selector:
    app: circleguard-form-service
  ports:
    - port: 8086
      targetPort: 8086
