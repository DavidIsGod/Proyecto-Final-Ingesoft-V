apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: circleguard
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush        1
    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        Tag               kube.*
    [OUTPUT]
        Name            es
        Match           *
        Host            elasticsearch
        Port            9200
        Index           circleguard-logs
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: circleguard
spec:
  selector:
    matchLabels:
      app: fluent-bit
  template:
    metadata:
      labels:
        app: fluent-bit
    spec:
      containers:
        - name: fluent-bit
          image: fluent/fluent-bit:2.2
          volumeMounts:
            - name: config
              mountPath: /fluent-bit/etc/fluent-bit.conf
              subPath: fluent-bit.conf
            - name: varlog
              mountPath: /var/log
      volumes:
        - name: config
          configMap:
            name: fluent-bit-config
        - name: varlog
          hostPath:
            path: /var/log
