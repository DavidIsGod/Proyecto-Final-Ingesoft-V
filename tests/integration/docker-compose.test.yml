services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: circleguard
    ports:
      - "5433:5432"
    volumes:
      - ../../init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

  redis:
    image: redis:7.2
    ports:
      - "6380:6379"
