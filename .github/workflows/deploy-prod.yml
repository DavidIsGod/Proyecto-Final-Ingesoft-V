name: Deploy Production

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Deploy to production
        run: |
          echo "Deploy prod — requiere aprobación en environment production"
          kubectl apply -k k8s/ --dry-run=client -o yaml

      - name: Rollback hint
        if: failure()
        run: echo "Rollback kubectl rollout undo deployment/<service> -n circleguard"
