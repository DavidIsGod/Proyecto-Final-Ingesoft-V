name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - name: Run tests
        run: ./gradlew test jacocoTestReport --no-daemon

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: services/**/build/reports/jacoco/test/

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.0"

      - name: Validate Terraform environments
        run: |
          for env in dev stage prod; do
            echo "Validating $env..."
            (cd terraform/environments/$env && terraform init -backend=false && terraform validate)
          done

  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install and test
        run: |
          npm ci
          npm test -- --ci

  notify-failure:
    runs-on: ubuntu-latest
    needs: [backend, mobile, terraform]
    if: failure()
    steps:
      - name: Log failure
        run: echo "CI failed — revisar logs del workflow"
