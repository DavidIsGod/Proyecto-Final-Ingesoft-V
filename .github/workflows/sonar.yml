name: SonarQube

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sonar:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - name: Test with coverage
        run: ./gradlew test jacocoTestReport --no-daemon

      - name: SonarCloud scan
        if: ${{ secrets.SONAR_TOKEN != '' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sSLo sonar-scanner.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
          unzip -q sonar-scanner.zip
          ./sonar-scanner-5.0.1.3006-linux/bin/sonar-scanner \
            -Dsonar.projectKey=circleguard \
            -Dsonar.organization=circleguard-org \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.java.binaries=services/*/build/classes \
            -Dsonar.coverage.jacoco.xmlReportPaths=services/*/build/reports/jacoco/test/jacocoTestReport.xml

      - name: Skip Sonar (no token)
        if: ${{ secrets.SONAR_TOKEN == '' }}
        run: echo "SONAR_TOKEN no configurado — análisis omitido"
