name: Deploy Stage

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Deploy to stage
        run: |
          echo "Deploy stage — configurar KUBE_CONFIG secret para cluster real"
          kubectl apply -k k8s/ --dry-run=client -o yaml
