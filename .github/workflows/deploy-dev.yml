name: Deploy Dev

on:
  push:
    branches: [develop]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: development
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate manifests
        run: |
          echo "Validando manifiestos K8s (sin cluster)"
          kubectl apply -k k8s/ --dry-run=client --validate=false -o yaml | head -30

      - name: Deploy to dev
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG }}
        run: |
          if [ -z "$KUBE_CONFIG_B64" ]; then
            echo "KUBE_CONFIG no configurado — deploy real omitido"
            exit 0
          fi
          mkdir -p ~/.kube
          echo "$KUBE_CONFIG_B64" | base64 -d > ~/.kube/config
          kubectl apply -k k8s/
