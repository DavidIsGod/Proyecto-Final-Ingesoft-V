spring:
  config:
    import: optional:classpath:actuator.yml
  application:
    name: circleguard-dashboard-service
  datasource:
    url: jdbc:postgresql://localhost:5432/circleguard_dashboard
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8084

circleguard:
  promotion-service:
    url: http://localhost:8088
  features:
    analytics-enabled: true

resilience4j:
  circuitbreaker:
    instances:
      promotionClient:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
