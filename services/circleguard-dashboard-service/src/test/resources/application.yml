spring:
  datasource:
    url: jdbc:h2:mem:dashboard-test;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false

circleguard:
  promotion-service:
    url: http://localhost:8088
  features:
    analytics-enabled: true

resilience4j:
  circuitbreaker:
    instances:
      promotionClient:
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 5s
