global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: circleguard-auth
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8180"]
  - job_name: circleguard-notification
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8082"]
  - job_name: circleguard-identity
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8083"]
  - job_name: circleguard-dashboard
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8084"]
  - job_name: circleguard-file
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8085"]
  - job_name: circleguard-form
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8086"]
  - job_name: circleguard-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8087"]
  - job_name: circleguard-promotion
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8088"]
